server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths serve index.html so the
    # client-side router (if added later) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
